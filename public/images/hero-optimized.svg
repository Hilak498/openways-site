<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="480" viewBox="0 0 1600 480" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Open Ways hero illustration">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#0b1220" stop-opacity="0.75" />
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="1">
      <stop offset="0%" stop-color="#FFEDCC" />
      <stop offset="100%" stop-color="#FFD37A" />
    </linearGradient>
    <filter id="f1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" result="b" />
      <feBlend in="SourceGraphic" in2="b" />
    </filter>
  </defs>

  <rect width="1600" height="480" fill="url(#g1)" />

  <!-- soft accent blobs -->
  <g filter="url(#f1)">
    <ellipse cx="300" cy="160" rx="260" ry="120" fill="#0ea5a8" fill-opacity="0.08" />
    <ellipse cx="1200" cy="200" rx="340" ry="160" fill="#f59e0b" fill-opacity="0.06" />
  </g>

  <!-- subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <path d="M60 60 L1540 60" />
    <path d="M60 140 L1540 140" />
    <path d="M60 220 L1540 220" />
    <path d="M60 300 L1540 300" />
  </g>

  <!-- central card-like shape -->
  <g transform="translate(200,80)">
    <rect x="0" y="0" width="1200" height="320" rx="18" fill="#081127" fill-opacity="0.12" />
    <rect x="12" y="12" width="1176" height="296" rx="14" fill="#071124" />

    <!-- headline group -->
    <g transform="translate(48,40)">
      <rect x="0" y="0" width="520" height="36" rx="6" fill="url(#g2)" />
      <rect x="0" y="56" width="420" height="20" rx="6" fill="#0ea5a8" fill-opacity="0.12" />
      <rect x="0" y="92" width="360" height="14" rx="6" fill="#94a3b8" fill-opacity="0.08" />
    </g>

    <!-- graph / chart motif -->
    <g transform="translate(640,52)">
      <rect x="0" y="72" width="28" height="48" rx="4" fill="#60a5fa" />
      <rect x="42" y="38" width="28" height="82" rx="4" fill="#6366f1" />
      <rect x="84" y="0" width="28" height="120" rx="4" fill="#f97316" />
      <rect x="126" y="32" width="28" height="88" rx="4" fill="#f59e0b" />
      <circle cx="200" cy="50" r="28" fill="#fff" fill-opacity="0.06" />
    </g>

    <!-- decorative path representing a 'way' -->
    <path d="M48 240 C 180 160, 420 160, 560 220 S 980 320, 1100 220" stroke="#fff" stroke-opacity="0.06" stroke-width="4" fill="none" stroke-linecap="round" />
  </g>

  <!-- small logo mark bottom-left -->
  <g transform="translate(56,370)">
    <circle cx="0" cy="0" r="18" fill="#ffd27a" />
    <rect x="30" y="-8" width="160" height="16" rx="8" fill="#ffffff" fill-opacity="0.06" />
  </g>

  <title>Open Ways — ייעוץ עסקי, משכנתאות וגיוס אשראי עסקי</title>
</svg>
